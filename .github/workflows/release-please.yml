name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    name: Create Release PR
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Prefer a PAT (with repo + pull-requests scopes) stored as RELEASE_PLEASE_TOKEN.
          # If the secret is absent the expression resolves to an empty string, so we
          # fall back explicitly to GITHUB_TOKEN via the env-level default below.
          # To create a PAT: https://github.com/settings/tokens/new?scopes=repo
          token: ${{ secrets.RELEASE_PLEASE_TOKEN != '' && secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
